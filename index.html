    {!disclaimerAccepted&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:9999,background:"rgba(0,0,0,0.55)",backdropFilter:"blur(6px)",WebkitBackdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",padding:M?12:20}}>
      <div style={{background:"#ffffff",borderRadius:14,maxWidth:560,width:"100%",padding:M?"24px 20px":"36px 40px",boxShadow:"0 20px 60px rgba(0,0,0,0.25)",border:"1px solid #e2e8f0",maxHeight:M?"90vh":undefined,overflow:M?"auto":undefined}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:M?14:20}}>

        </div>
        <button onClick={function(){setDisclaimerAccepted(true)}} style={{padding:M?"14px 24px":"12px 32px",borderRadius:8,border:"none",background:"#1e293b",color:"#ffffff",cursor:"pointer",fontSize:22,fontWeight:700,width:M?"100%":undefined}}>I Understand &amp; Accept</button>
      </div>
    </div>}

    <div style={{display:"flex",flexDirection:M?"column":"row",justifyContent:"space-between",alignItems:M?"stretch":"center",marginBottom:6,paddingBottom:4,borderBottom:"1px solid "+BORDER,gap:M?6:0}}>

      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <button onClick={function(){setShowGuide(!showGuide)}} style={{padding:M?"10px 14px":"8px 16px",borderRadius:6,border:"1px solid "+BORDER,background:showGuide?"#1e293b":"#f8fafc",color:showGuide?"#fff":"#64748b",cursor:"pointer",fontSize:M?16:20,fontWeight:600,flex:M?1:undefined}}>
          {showGuide?"\u2715 Hide Guide":"? How to Use"}
        </button>
        <button onClick={doReset} style={{padding:M?"10px 16px":"8px 20px",borderRadius:6,border:"none",background:"#34d399",color:"#ffffff",cursor:"pointer",fontSize:M?16:24,fontWeight:700}}>Reset</button>
      </div>
    </div>

    {showGuide&&<div style={{marginBottom:12,padding:M?"14px":"20px 24px",background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0"}}>
      <div style={{fontSize:M?15:21,color:"#475569",lineHeight:1.6,marginBottom:16}}>
        This dashboard visualizes the City of San Bruno's General Fund surplus or deficit over six fiscal years (FY27{"\u2013"}FY32). The baseline includes the $3M VLF Backfill loss already incorporated in the FY27 draft budget. The City has a structural budget deficit meaning that the growth in expenditures outpaces growth in revenue. Toggle revenue risks, add revenue measures, cut services by a percentage, and use reserves to plot a path to a structurally balanced budget.
      </div>
      <div style={{display:"grid",gridTemplateColumns:M?"1fr":"1fr 1fr 1fr 1fr",gap:M?8:12,marginBottom:16}}>
        {[{n:1,t:"Revenue Risks",c:RED,d:"Click the red bar to toggle revenue risks and pick the year each hits."},{n:2,t:"Revenue Opportunities",c:GREEN,d:"Click the green bar to add voter-approved revenue measures for 2026, 2028, or 2030 elections."},{n:3,t:"Service Cuts",c:AMBER,d:"Use +/\u2013 to set percent service reductions. 1% \u2248 1.8 FTEs \u2248 $410K/yr. Cuts compound forward."},{n:4,t:"Use Reserves",c:PURPLE,d:"Toggle reserves on to cover a deficit year. Reserves cannot be used in FY32."}].map(function(g){
          return <div key={g.n} style={{padding:M?"10px 12px":"14px 16px",borderRadius:8,background:"#fff",border:"1px solid #e2e8f0",borderTop:"3px solid "+g.c}}>

            <div style={{fontSize:M?16:20,fontWeight:700,color:"#1e293b",marginBottom:4}}>{g.t}</div>
            <div style={{fontSize:M?14:16,color:"#64748b",lineHeight:1.5}}>{g.d}</div>

        })}
      </div>
      <div style={{display:"flex",flexDirection:M?"column":"row",gap:M?4:24,fontSize:M?14:18,color:"#64748b"}}>
        <span><strong style={{color:RED}}>Structural Gap:</strong> Revenue +2.9%/yr vs Expenditures +4.0%/yr</span>
        <span><strong style={{color:AMBER}}>Key Insight:</strong> Early service cuts are 2.5x more effective than late action</span>
      </div>
    </div>}

    <div style={{position:"relative",marginBottom:6}}>
      <div style={{display:"flex",flexDirection:M?"column":"row",gap:6,marginBottom:6}}>
        <button onClick={function(){setRiskOpen(!riskOpen);if(!riskOpen)setOppOpen(false)}} style={{flex:1,padding:M?"14px 16px":"10px 16px",borderRadius:8,border:"none",background:RED,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:M?18:21,fontWeight:700,color:"#ffffff",textTransform:"uppercase",letterSpacing:1.5}}>Revenue Risks</span>
            <span style={{fontSize:M?16:20,color:"rgba(255,255,255,0.7)"}}>{Object.values(rT).filter(function(v){return v!=="Off"}).length}/{riskItems.length}</span>
          </div>
          <span style={{fontSize:24,color:"#ffffff",display:"inline-block",transform:riskOpen?"rotate(180deg)":"rotate(0deg)"}}>{"\u25BC"}</span>
        </button>
        <button onClick={function(){setOppOpen(!oppOpen);if(!oppOpen)setRiskOpen(false)}} style={{flex:1,padding:M?"14px 16px":"10px 16px",borderRadius:8,border:"none",background:GREEN,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:M?18:21,fontWeight:700,color:"#ffffff",textTransform:"uppercase",letterSpacing:1.5}}>Opportunities</span>
            <span style={{fontSize:M?16:20,color:"rgba(255,255,255,0.7)"}}>{Object.values(oT).filter(function(v){return v!=="Off"}).length}/{opportunityItems.length}</span>
          </div>
          <span style={{fontSize:24,color:"#ffffff",display:"inline-block",transform:oppOpen?"rotate(180deg)":"rotate(0deg)"}}>{"\u25BC"}</span>
        </button>
      </div>

      {(Object.values(rT).some(function(v){return v!=="Off"})||Object.values(oT).some(function(v){return v!=="Off"}))&&<div style={{display:"flex",flexDirection:M?"column":"row",gap:M?4:8,marginBottom:6}}>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {riskItems.filter(function(r){return rT[r.id]!=="Off"}).map(function(r){return <span key={r.id} style={{fontSize:M?14:18,padding:M?"4px 10px":"3px 10px",borderRadius:20,background:RED+"12",border:"1px solid "+RED+"25",color:"#64748b",display:"inline-flex",alignItems:"center",gap:4}}>{r.label} <span style={{color:RED,fontWeight:700}}>{rT[r.id]}</span></span>;})}
          {opportunityItems.filter(function(o){return oT[o.id]!=="Off"}).map(function(o){return <span key={o.id} style={{fontSize:M?14:18,padding:M?"4px 10px":"3px 10px",borderRadius:20,background:GREEN+"12",border:"1px solid "+GREEN+"25",color:"#64748b",display:"inline-flex",alignItems:"center",gap:4}}>{o.label} <span style={{color:GREEN,fontWeight:700}}>{oT[o.id]}</span></span>;})}
        </div>
      </div>}

      <div style={{background:CARD_BG,border:"1px solid "+BORDER,borderRadius:8,padding:M?"8px 4px":"12px 8px"}}>
        <div style={{fontSize:M?16:24,textTransform:"uppercase",letterSpacing:1.5,color:GRAY,fontWeight:600,marginBottom:6,padding:M?"0 4px":0}}>Revenue vs Expenditure Projection</div>
        <div style={{fontSize:M?14:22,color:GRAY,marginBottom:6,padding:M?"0 4px":0}}>
          <span style={{color:RED_LIGHT,fontWeight:600}}>{"\u25A0"}</span> Exp
          <span style={{marginLeft:10,color:GREEN,fontWeight:600}}>{"\u25A0"}</span> Rev
          {tru>0&&<span><span style={{marginLeft:10,color:PURPLE,fontWeight:600}}>{"\u25A0"}</span> +Reserves</span>}
        </div>
        <SvgChart chartData={cd} yMin={ymn} yMax={ymx} totalReservesUsed={tru} M={M}/>
      </div>

      {riskOpen&&<div style={{position:M?"fixed":"absolute",top:M?0:52,left:0,right:0,bottom:M?0:undefined,zIndex:20,borderRadius:M?0:8,border:M?"none":"1px solid "+RED+"33",background:M?"#ffffff":"rgba(255,255,255,0.92)",backdropFilter:M?undefined:"blur(12px)",WebkitBackdropFilter:M?undefined:"blur(12px)",boxShadow:M?undefined:"0 8px 32px rgba(0,0,0,0.12)",padding:M?"16px 12px":"16px",overflow:"auto",maxHeight:M?"100vh":"calc(100% - 58px)"}}>
        {M&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,position:"sticky",top:0,background:"#fff",paddingBottom:8,borderBottom:"1px solid "+BORDER}}>
          <span style={{fontSize:20,fontWeight:700,color:RED,textTransform:"uppercase"}}>Revenue Risks</span>
          <button onClick={function(){setRiskOpen(false)}} style={{width:44,height:44,borderRadius:8,border:"1px solid "+BORDER,background:"#f8fafc",color:GRAY,cursor:"pointer",fontSize:22,display:"flex",alignItems:"center",justifyContent:"center"}}>{"\u2715"}</button>
        </div>}
        <div style={{display:M?"flex":"grid",flexDirection:"column",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <TimingPanel title={M?"":"Risks"} items={riskItems.filter(function(r){return ["vlf","trsa","cardroom"].indexOf(r.id)>=0})} timings={rT} onTimingChange={setRT} accentColor={RED} M={M}/>
          <TimingPanel title={M?"":"Risks (cont.)"} items={riskItems.filter(function(r){return ["vlf2","eraf","trsa_repay"].indexOf(r.id)>=0})} timings={rT} onTimingChange={setRT} accentColor={RED} M={M}/>
        </div>
      </div>}
      {oppOpen&&<div style={{position:M?"fixed":"absolute",top:M?0:52,left:0,right:0,bottom:M?0:undefined,zIndex:20,borderRadius:M?0:8,border:M?"none":"1px solid "+GREEN+"33",background:M?"#ffffff":"rgba(255,255,255,0.92)",backdropFilter:M?undefined:"blur(12px)",WebkitBackdropFilter:M?undefined:"blur(12px)",boxShadow:M?undefined:"0 8px 32px rgba(0,0,0,0.12)",padding:M?"16px 12px":"16px",overflow:"auto",maxHeight:M?"100vh":undefined}}>
        {M&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,position:"sticky",top:0,background:"#fff",paddingBottom:8,borderBottom:"1px solid "+BORDER}}>
          <span style={{fontSize:20,fontWeight:700,color:GREEN,textTransform:"uppercase"}}>Revenue Opportunities</span>
          <button onClick={function(){setOppOpen(false)}} style={{width:44,height:44,borderRadius:8,border:"1px solid "+BORDER,background:"#f8fafc",color:GRAY,cursor:"pointer",fontSize:22,display:"flex",alignItems:"center",justifyContent:"center"}}>{"\u2715"}</button>
        </div>}
        <TimingPanel title={M?"":"Opportunities"} items={opportunityItems} timings={oT} onTimingChange={setOT} accentColor={GREEN} yearOptions={ELECTION_YEARS} M={M}/>
      </div>}
    </div>

    <div style={{background:CARD_BG,border:"1px solid "+BORDER,borderRadius:8,padding:M?"8px 6px":"10px 14px"}}>
      <div style={{fontSize:M?14:24,textTransform:"uppercase",letterSpacing:M?0.5:1.5,color:AMBER,fontWeight:700,marginBottom:8}}>Annual Balancing &#x2014; Cuts Compound Forward</div>
      <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:M?14:24,minWidth:M?560:undefined}}>
          <thead><tr>
            <th style={{textAlign:"left",padding:"4px",borderBottom:"2px solid "+BORDER,color:GRAY,fontSize:M?12:22,width:M?90:140,...stickyTd}}></th>
            {yr.map(function(y){return <th key={y.year} style={{textAlign:"center",padding:"4px",borderBottom:"2px solid "+(y.isBalanced?GREEN:RED)+"44",color:y.isBalanced?GREEN:WHITE,fontWeight:700,fontSize:M?14:27,whiteSpace:"nowrap"}}>{y.year}{y.isBalanced?" \u2713":""}</th>})}
          </tr></thead>
          <tbody>
            <tr style={{background:"rgba(0,0,0,0.025)"}}><td style={{padding:"4px",color:GRAY,fontSize:M?12:24,borderBottom:"1px solid "+BORDER+"22",...stickyTdAlt}}>Begin Surplus/(Deficit)</td>
              {yr.map(function(y){return <td key={y.year} style={{textAlign:"center",padding:"4px",borderBottom:"1px solid "+BORDER+"22",fontWeight:700,color:y.rawGap>=0?GREEN:RED_LIGHT,fontSize:M?14:27,whiteSpace:"nowrap"}}>{fmtSigned(y.rawGap)}</td>})}</tr>
            <tr><td style={{padding:"4px",color:AMBER,fontSize:M?12:24,fontWeight:600,borderBottom:"1px solid "+BORDER+"22",...stickyTd}}>Service cuts</td>
              {yr.map(function(y){return <td key={y.year} style={{textAlign:"center",padding:"4px",borderBottom:"1px solid "+BORDER+"22"}}><Stepper value={y.thisYearCutPct} onChange={function(v){sYC(function(p){var n=Object.assign({},p);n[y.year]=v;return n})}} min={0} max={25} step={1} color={AMBER} M={M}/></td>})}</tr>
            <tr style={{background:"rgba(0,0,0,0.025)"}}><td style={{padding:"4px",color:GRAY,fontSize:M?12:24,borderBottom:"1px solid "+BORDER+"22",...stickyTdAlt}}>Cumul. reduction</td>
              {yr.map(function(y){return <td key={y.year} style={{textAlign:"center",padding:"4px",borderBottom:"1px solid "+BORDER+"22",color:y.cumulativeCutPct>0?AMBER:GRAY,fontWeight:700,fontSize:M?14:26}}>{y.cumulativeCutPct>0?y.cumulativeCutPct+"%":"\u2014"}</td>})}</tr>
            <tr><td style={{padding:"4px",color:GRAY,fontSize:M?12:24,borderBottom:"1px solid "+BORDER+"22",...stickyTd}}>Adj. Surplus/(Deficit)</td>
              {yr.map(function(y){return <td key={y.year} style={{textAlign:"center",padding:"4px",borderBottom:"1px solid "+BORDER+"22",fontWeight:700,color:y.gapAfterCuts>=0?GREEN:RED_LIGHT,fontSize:M?14:27,whiteSpace:"nowrap"}}>{fmtSigned(y.gapAfterCuts)}</td>})}</tr>
            <tr style={{background:"rgba(0,0,0,0.025)"}}><td style={{padding:"4px",color:PURPLE,fontSize:M?12:24,fontWeight:600,borderBottom:"1px solid "+BORDER+"22",...stickyTdAlt}}>Use reserves</td>
              {yr.map(function(y){
                if(y.isFY32)return <td key={y.year} style={{textAlign:"center",padding:"4px",borderBottom:"1px solid "+BORDER+"22",fontSize:M?12:22,color:AMBER}}>locked</td>;
                if(y.gapAfterCuts>=0)return <td key={y.year} style={{textAlign:"center",padding:"4px",borderBottom:"1px solid "+BORDER+"22",color:GREEN,fontSize:M?14:24}}>{"\u2014"}</td>;
                var we=!y.useReserves&&Math.abs(y.gapAfterCuts)>y.reserveBal;
                return <td key={y.year} style={{textAlign:"center",padding:"4px",borderBottom:"1px solid "+BORDER+"22"}}>
                  <div onClick={function(){if(!we)sYR(function(p){var n=Object.assign({},p);n[y.year]=!p[y.year];return n})}} style={{cursor:we?"default":"pointer",opacity:we?0.4:1,display:"inline-block",padding:M?"8px 0":"0"}}>
                    <div style={{width:tw,height:th,borderRadius:th/2,background:y.useReserves?PURPLE:"#2a2a3a",position:"relative",margin:"0 auto"}}><div style={{width:tr,height:tr,borderRadius:"50%",background:"#fff",position:"absolute",top:tk,left:y.useReserves?ton:tk,transition:"left 0.2s"}}/></div>
                    {y.useReserves&&<div style={{fontSize:M?14:22,color:PURPLE,marginTop:1}}>{fmt(y.reserveAmount)}</div>}
                  </div></td>;})}</tr>
            <tr style={{borderTop:"2px solid "+BORDER}}><td style={{padding:"5px 4px",fontWeight:700,color:WHITE,fontSize:M?12:26,...stickyTd}}>Ending Surplus/(Deficit)</td>
              {yr.map(function(y){return <td key={y.year} style={{textAlign:"center",padding:"5px 4px"}}>
                <div style={{fontSize:M?14:22,fontWeight:800,color:y.isBalanced?GREEN:RED_LIGHT}}>{y.isBalanced?"\u2713":"("+fmt(Math.abs(y.finalPosition))+")"}</div>
                {y.isBalanced&&y.finalPosition>0.05&&<div style={{fontSize:M?12:21,color:GREEN}}>{fmt(y.finalPosition)}</div>}
              </td>})}</tr>
          </tbody>
        </table>
      </div>
    </div>
    <div style={{marginTop:4,padding:"2px 0",borderTop:"1px solid "+BORDER,fontSize:21,color:"#999",textAlign:"center"}}></div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<ForecastDashboard/>);
  </script>
