<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>San Bruno General Fund Forecast</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; color: #111827; font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif; }
    #root { min-height: 100vh; }
    button:focus { outline: none; }
    #loading { display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column; }
    #loading h2 { color:#4b5563;font-size:16px; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
</head>
<body>
  <div id="root"><div id="loading"><h2>Loading...</h2></div></div>
  <script type="text/babel">
const { useState, useCallback, Fragment } = React;

const DARK="#ffffff",CARD_BG="#f5f6f8",BORDER="#d0d5dd",RED="#e63946",RED_LIGHT="#dc2626",AMBER="#d97706",GREEN="#0f766e",GREEN_LIGHT="#0d9488",PURPLE="#7c3aed",GRAY="#4b5563",WHITE="#111827";
const RESERVE_BASE=50.0,RESERVE_ANNUAL_GROWTH=4.0;
const YEARS=["FY27","FY28","FY29","FY30","FY31","FY32"];
const baseData=[{year:"FY27",rev:78.44,exp:77.16},{year:"FY28",rev:80.26,exp:81.31},{year:"FY29",rev:82.17,exp:85.21},{year:"FY30",rev:83.74,exp:87.98},{year:"FY31",rev:85.38,exp:90.85},{year:"FY32",rev:87.07,exp:93.81}];
const departments=[{id:"police",label:"Police",sb:17.34,ftes:72},{id:"fire",label:"Fire",sb:12.17,ftes:40},{id:"commsvc",label:"Comm Svcs",sb:4.14,ftes:25.7},{id:"pw",label:"Public Wks",sb:2.72,ftes:21.51},{id:"admin",label:"Admin Svcs",sb:2.98,ftes:15.15},{id:"cm",label:"City Mgr",sb:1.49,ftes:7.35},{id:"cd",label:"Comm Dev",sb:0.24,ftes:1.15}];
const totalSB=departments.reduce((s,d)=>s+d.sb,0);
const totalFTEs=departments.reduce((s,d)=>s+d.ftes,0);
const riskItems=[
  {id:"vlf",label:"VLF Backfill",amount:3.0,expReduction:0,color:RED,detail:"$3M revenue loss"},
  {id:"vlf2",label:"VLF Backfill II",amount:4.0,expReduction:0,color:RED,detail:"Additional $4M VLF revenue loss"},
  {id:"trsa",label:"TRSA",amount:8.0,expReduction:4.0,color:RED,detail:"$8M revenue loss, $4M lower reserve transfer, (net \u2013$4M)"},
  {id:"trsa_repay",label:"TRSA Repayment",amount:0,expBase:43.0,expPerYear:8.0,oneTime:true,color:RED,detail:"One-time repayment: $43M FY27 + $8M per year collected"},
  {id:"eraf",label:"Excess ERAF",amount:2.0,expReduction:0,color:RED,detail:"$2M revenue loss"},
  {id:"cardroom",label:"Cardroom",amount:3.4,expReduction:0,color:RED,detail:"$3.4M revenue loss"}
];
const opportunityItems=[
  {id:"measure6",label:"$7.0M Revenue Measure",amount:7.0,growth:0.04,color:GREEN,detail:"Major tax measure, grows 4.0%/yr."},
  {id:"measure35",label:"$3.5M Revenue Measure",amount:3.5,growth:0.02,color:GREEN,detail:"Moderate tax measure, grows 2.0%/yr."},
  {id:"measure1",label:"$1.0M Revenue Measure",amount:1.0,growth:0.02,color:GREEN_LIGHT,detail:"Smaller tax measure, grows 2.0%/yr."}
];
const ELECTION_YEARS=["2026","2028","2030"];
const ELECTION_TO_FY={"2026":"FY28","2028":"FY30","2030":"FY32"};
function fmt(n){return "$"+Math.abs(n).toFixed(1)+"M";}
function fmtSigned(n){return n<-0.05?"("+fmt(n)+")":"$"+n.toFixed(1)+"M";}

function KPICard({label,value,sub,color,accent}){
  return <div style={{background:CARD_BG,border:"1px solid "+BORDER,borderRadius:8,padding:"8px 12px",flex:1,borderTop:"3px solid "+(accent||BORDER)}}>
    <div style={{fontSize:15,textTransform:"uppercase",letterSpacing:1.5,color:GRAY,marginBottom:1}}>{label}</div>
    <div style={{fontSize:20,fontWeight:800,color:color||WHITE,lineHeight:1.2}}>{value}</div>
    {sub&&<div style={{fontSize:15,color:GRAY,marginTop:1}}>{sub}</div>}
  </div>;
}

function YearSelector({value,onChange,color,options:co}){
  var opts=["Off"].concat(co||YEARS);
  return <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
    {opts.map(function(o){var a=value===o,off=o==="Off";
      return <button key={o} onClick={function(){onChange(o)}} style={{padding:"2px 5px",borderRadius:3,border:"none",fontSize:15,fontWeight:700,cursor:"pointer",background:a?(off?"#2a2a3a":color+"33"):"rgba(255,255,255,0.04)",color:a?(off?GRAY:color):"#444",outline:a?"1px solid "+(off?"#444":color):"none"}}>{o}</button>;
    })}
  </div>;
}

function TimingPanel({title,items,timings,onTimingChange,accentColor,yearOptions}){
  var isRisk=accentColor===RED;
  var ac=Object.values(timings).filter(function(v){return v!=="Off"}).length;
  return <div style={{background:CARD_BG,border:"1px solid "+BORDER,borderRadius:8,padding:"10px 12px",display:"flex",flexDirection:"column",height:"100%"}}>
    <div style={{fontSize:16,textTransform:"uppercase",letterSpacing:1.5,color:accentColor,marginBottom:6,fontWeight:700}}>{title}</div>
    <div style={{flex:1}}>{items.map(function(item){
      var timing=timings[item.id]||"Off",isA=timing!=="Off";
      var da=item.amount;
      if(item.expBase!==undefined){var yi=isA?YEARS.indexOf(timing):-1;da=isA?item.expBase+(item.expPerYear||0)*yi:0;}
      return <div key={item.id} style={{padding:"6px 8px",marginBottom:5,borderRadius:5,background:isA?item.color+"10":"rgba(255,255,255,0.015)",border:"1px solid "+(isA?item.color+"35":BORDER)}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div><span style={{fontSize:17,fontWeight:600,color:isA?"#fff":GRAY}}>{item.label}</span><span style={{fontSize:15,color:isA?item.color+"99":"#444",marginLeft:6}}>{item.detail}</span></div>
          <div style={{fontSize:14,fontWeight:800,color:isA?item.color:"#bbb",flexShrink:0}}>{isRisk?"("+fmt(da)+")":fmt(da)}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:15,color:GRAY,flexShrink:0}}>{isRisk?"Hits in:":"Election:"}</span>
          <YearSelector value={timing} onChange={function(yr){onTimingChange(item.id,yr)}} color={item.color} options={yearOptions}/>
        </div>
      </div>;
    })}</div>
    <div style={{paddingTop:4,borderTop:"1px solid "+BORDER,fontSize:16,color:GRAY}}>{ac} of {items.length} active</div>
  </div>;
}

function Stepper({value,onChange,min,max,step,color,cumulativePct}){
  return <div>
    <div style={{display:"flex",alignItems:"center",gap:2,justifyContent:"center"}}>
      <button onClick={function(){onChange(Math.max(min,value-step))}} style={{width:18,height:18,borderRadius:3,border:"1px solid "+BORDER,background:"rgba(0,0,0,0.04)",color:GRAY,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>-</button>
      <div style={{fontSize:15,fontWeight:800,color:value>0?color:GRAY,minWidth:28,textAlign:"center"}}>{value}%</div>
      <button onClick={function(){onChange(Math.min(max,value+step))}} style={{width:18,height:18,borderRadius:3,border:"1px solid "+BORDER,background:"rgba(0,0,0,0.04)",color:GRAY,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>+</button>
    </div>
  </div>;
}

function SvgChart({chartData,yMin,yMax,totalReservesUsed}){
  var[hi,setHi]=useState(null);
  var W=1600,H=500,PL=55,PR=15,PT=15,PB=35,pW=W-PL-PR,pH=H-PT-PB,n=chartData.length;
  function xP(i){return PL+(i/(n-1))*pW;}
  function yP(v){return PT+pH-((v-yMin)/(yMax-yMin))*pH;}
  function mp(k){return chartData.map(function(d,i){return(i===0?"M":"L")+xP(i).toFixed(1)+","+yP(d[k]).toFixed(1)}).join(" ");}
  var gl=[];for(var v=yMin;v<=yMax;v+=5)gl.push(v);
  var hd=hi!==null?chartData[hi]:null,hG=hd?hd.adjRev-hd.exp:0,hR=hd?(hd.balanced||hd.adjRev)-hd.adjRev:0;

  // Build crosshatch segments between revenue and expenditure lines
  var segments=[];
  for(var i=0;i<n-1;i++){
    var x1=xP(i),x2=xP(i+1);
    var r1=chartData[i].adjRev,r2=chartData[i+1].adjRev;
    var e1=chartData[i].exp,e2=chartData[i+1].exp;
    var d1=r1-e1,d2=r2-e2;
    if((d1>=0&&d2>=0)||(d1<=0&&d2<=0)){
      // No crossing - single segment
      var color=d1>=0?"surplus":"deficit";
      segments.push({path:"M"+x1.toFixed(1)+","+yP(r1).toFixed(1)+" L"+x2.toFixed(1)+","+yP(r2).toFixed(1)+" L"+x2.toFixed(1)+","+yP(e2).toFixed(1)+" L"+x1.toFixed(1)+","+yP(e1).toFixed(1)+" Z",color:color});
    } else {
      // Lines cross - find intersection
      var t=d1/(d1-d2);
      var cx=x1+t*(x2-x1);
      var cv=r1+t*(r2-r1);
      // First segment (before crossing)
      segments.push({path:"M"+x1.toFixed(1)+","+yP(r1).toFixed(1)+" L"+cx.toFixed(1)+","+yP(cv).toFixed(1)+" L"+x1.toFixed(1)+","+yP(e1).toFixed(1)+" Z",color:d1>=0?"surplus":"deficit"});
      // Second segment (after crossing)
      segments.push({path:"M"+cx.toFixed(1)+","+yP(cv).toFixed(1)+" L"+x2.toFixed(1)+","+yP(r2).toFixed(1)+" L"+x2.toFixed(1)+","+yP(e2).toFixed(1)+" Z",color:d2>=0?"surplus":"deficit"});
    }
  }

  return <div style={{position:"relative",height:H}}>
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"100%"}} onMouseLeave={function(){setHi(null)}}>
      <defs>
        <pattern id="hatch-green" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="8" stroke={GREEN} strokeWidth="2" opacity="0.35"/>
        </pattern>
        <pattern id="hatch-red" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(-45)">
          <line x1="0" y1="0" x2="0" y2="8" stroke={RED} strokeWidth="2" opacity="0.35"/>
        </pattern>
      </defs>
      {gl.map(function(v){return <g key={v}><line x1={PL} x2={W-PR} y1={yP(v)} y2={yP(v)} stroke="#e0e4ea" strokeDasharray="3 3"/><text x={PL-6} y={yP(v)+3} fill={GRAY} fontSize={10} textAnchor="end">{"$"+v+"M"}</text></g>})}
      {chartData.map(function(d,i){return <text key={d.year} x={xP(i)} y={H-5} fill={GRAY} fontSize={12} fontWeight={600} textAnchor="middle">{d.year}</text>})}
      {segments.map(function(s,i){return <path key={"seg"+i} d={s.path} fill={s.color==="surplus"?"url(#hatch-green)":"url(#hatch-red)"}/>})}
      <path d={mp("exp")} fill="none" stroke={RED_LIGHT} strokeWidth={4}/>
      <path d={mp("adjRev")} fill="none" stroke={GREEN} strokeWidth={3.5}/>
      {totalReservesUsed>0&&<Fragment><path d={mp("balanced")} fill="none" stroke={PURPLE} strokeWidth={3} strokeDasharray="6 3"/>{chartData.map(function(d,i){return <circle key={"b"+i} cx={xP(i)} cy={yP(d.balanced)} r={5} fill={PURPLE} stroke={DARK} strokeWidth={3}/>})}</Fragment>}
      {chartData.map(function(d,i){return <circle key={"e"+i} cx={xP(i)} cy={yP(d.exp)} r={6} fill={RED_LIGHT} stroke={DARK} strokeWidth={3}/>})}
      {chartData.map(function(d,i){return <circle key={"r"+i} cx={xP(i)} cy={yP(d.adjRev)} r={6} fill={GREEN} stroke={DARK} strokeWidth={3}/>})}
      {chartData.map(function(d,i){return <rect key={"h"+i} x={xP(i)-pW/(n*2)} y={PT} width={pW/n} height={pH} fill="transparent" onMouseEnter={function(){setHi(i)}}/>})}
      {hi!==null&&<line x1={xP(hi)} x2={xP(hi)} y1={PT} y2={PT+pH} stroke="#00000015" strokeWidth={1}/>}
    </svg>
    {hd&&hi!==null&&<div style={{position:"absolute",top:10,left:Math.min(xP(hi)/W*100,70)+"%",background:"#ffffffee",border:"1px solid #d0d5dd",borderRadius:8,padding:"10px 14px",fontSize:18,color:"#1a1a2e",minWidth:200,zIndex:10,pointerEvents:"none"}}>
      <div style={{fontWeight:800,fontSize:16,marginBottom:5}}>{hd.year}</div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{color:RED_LIGHT}}>Expenditures</span><span style={{fontWeight:700}}>{"$"+hd.exp.toFixed(1)+"M"}</span></div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{color:GREEN}}>Revenue</span><span style={{fontWeight:700}}>{"$"+hd.adjRev.toFixed(1)+"M"}</span></div>
      {hR>0.05&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{color:PURPLE}}>Reserves</span><span style={{fontWeight:700}}>{"$"+hR.toFixed(1)+"M"}</span></div>}
      <div style={{marginTop:4,paddingTop:4,borderTop:"1px solid #1e2d42",display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:14,color:hG>=-0.05?GREEN:RED_LIGHT}}>
        <span>{hG>=-0.05?"Surplus":"Gap"}</span><span>{hG>=0?"$"+hG.toFixed(1)+"M":"($"+Math.abs(hG).toFixed(1)+"M)"}</span>
      </div>
    </div>}
  </div>;
}

function ForecastDashboard(){
  var[rT,sRT]=useState({vlf:"Off",vlf2:"Off",trsa:"Off",trsa_repay:"Off",eraf:"Off",cardroom:"Off"});
  var[oT,sOT]=useState({measure6:"Off",measure35:"Off",measure1:"Off"});
  var[yC,sYC]=useState({FY27:0,FY28:0,FY29:0,FY30:0,FY31:0,FY32:0});
  var[yR,sYR]=useState({FY27:false,FY28:false,FY29:false,FY30:false,FY31:false});
  var[riskOpen,setRiskOpen]=useState(false);
  var[oppOpen,setOppOpen]=useState(false);
  var[showGuide,setShowGuide]=useState(true);
  var setRT=useCallback(function(id,yr){sRT(function(p){var n=Object.assign({},p);n[id]=yr;return n});setRiskOpen(false)},[]);
  var setOT=useCallback(function(id,yr){sOT(function(p){var n=Object.assign({},p);n[id]=yr;return n});setOppOpen(false)},[]);

  function gYI(year){
    var yi=YEARS.indexOf(year),ri=0,re=0,rx=0,oi=0;
    riskItems.forEach(function(r){var t=rT[r.id];if(t==="Off")return;var si=YEARS.indexOf(t);
      if(r.oneTime){if(yi===si){if(r.expBase!==undefined)rx+=r.expBase+(r.expPerYear||0)*si;else rx+=(r.expIncrease||0);ri+=r.amount;}}
      else{if(si>=0&&yi>=si){ri+=r.amount;re+=(r.expReduction||0);}}
    });
    opportunityItems.forEach(function(o){var t=oT[o.id];if(t==="Off")return;var sf=ELECTION_TO_FY[t];if(!sf)return;var si=YEARS.indexOf(sf);
      if(si>=0&&yi>=si)oi+=o.amount*Math.pow(1+(o.growth||0),yi-si);
    });
    return{riskImpact:ri,riskExpReduction:re,riskExpIncrease:rx,oppImpact:oi};
  }

  var yr=[],ccp=0,tru=0,rc=RESERVE_BASE;
  var tt=rT["trsa"],tsi=tt!=="Off"?YEARS.indexOf(tt):-1;
  // Compute reserve cap from TRSA growth
  baseData.forEach(function(d,idx){ if(tsi<0||idx<tsi)rc+=RESERVE_ANNUAL_GROWTH; });
  // Build model with running reserve balance
  var reserveBal=rc;
  baseData.forEach(function(d,idx){
    var im=gYI(d.year),ar=d.rev-im.riskImpact+im.oppImpact;
    var tcp=yC[d.year]||0;ccp+=tcp;var cs=(ccp/100)*totalSB;
    var ae=d.exp-cs-im.riskExpReduction+im.riskExpIncrease;
    var rg=ar-(d.exp-im.riskExpReduction+im.riskExpIncrease),gc=ar-ae;
    var f32=d.year==="FY32",ur=!f32&&yR[d.year]&&gc<0;
    var ra=ur?Math.min(Math.abs(gc),reserveBal):0;tru+=ra;
    var surplusToReserves=gc>0.05?gc:0;
    reserveBal=reserveBal-ra+surplusToReserves;
    var fp=gc+ra,ib=fp>=-0.05;
    var resTarget=ae*0.30;
    var targetMet=reserveBal>=resTarget;
    yr.push(Object.assign({},d,{adjRev:ar,adjExp:ae,rawGap:rg,riskImpact:im.riskImpact,riskExpReduction:im.riskExpReduction,riskExpIncrease:im.riskExpIncrease,oppImpact:im.oppImpact,thisYearCutPct:tcp,cumulativeCutPct:ccp,cumulativeSavings:cs,gapAfterCuts:gc,useReserves:ur,reserveAmount:ra,surplusToReserves:surplusToReserves,finalPosition:fp,isBalanced:ib,isFY32:f32,reserveBal:reserveBal,resTarget:resTarget,targetMet:targetMet}));
  });
  var rr=reserveBal;
  var finalTarget=yr.length>0?yr[yr.length-1].resTarget:0;
  var finalTargetMet=reserveBal>=finalTarget;
  var cd=yr.map(function(y){return{year:y.year,exp:y.adjExp,adjRev:y.adjRev,balanced:y.useReserves?y.adjExp:y.adjRev}});
  var av=cd.reduce(function(a,d){return a.concat([d.exp,d.adjRev,d.balanced])},[]);
  var ymn=Math.floor(Math.min.apply(null,av)/5)*5-5,ymx=Math.ceil(Math.max.apply(null,av)/5)*5+5;
  var f=yr[yr.length-1],ab=yr.every(function(y){return y.isBalanced});

  function doReset(){sRT({vlf:"Off",vlf2:"Off",trsa:"Off",trsa_repay:"Off",eraf:"Off",cardroom:"Off"});sOT({measure6:"Off",measure35:"Off",measure1:"Off"});sYC({FY27:0,FY28:0,FY29:0,FY30:0,FY31:0,FY32:0});sYR({FY27:false,FY28:false,FY29:false,FY30:false,FY31:false});setRiskOpen(false);setOppOpen(false);}

  return <div style={{fontFamily:"'IBM Plex Sans','Segoe UI',sans-serif",background:DARK,color:WHITE,minHeight:"100vh",display:"flex",flexDirection:"column",padding:"8px 12px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,paddingBottom:4,borderBottom:"1px solid "+BORDER}}>
      <div><div style={{fontSize:15,textTransform:"uppercase",letterSpacing:2,color:GRAY}}>City of San Bruno</div><div style={{fontSize:34,fontWeight:800}}>General Fund Forecast &#x2014; What If?</div></div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <button onClick={function(){setShowGuide(!showGuide)}} style={{padding:"8px 16px",borderRadius:6,border:"1px solid "+BORDER,background:showGuide?"#1e293b":"#f8fafc",color:showGuide?"#fff":"#64748b",cursor:"pointer",fontSize:13,fontWeight:600,transition:"all 0.2s"}}>
          {showGuide?"\u2715 Hide Guide":"? How to Use"}
        </button>
        <button onClick={doReset} style={{padding:"8px 20px",borderRadius:6,border:"none",background:"#34d399",color:"#ffffff",cursor:"pointer",fontSize:16,fontWeight:700,letterSpacing:0.5}}>Reset</button>
      </div>
    </div>

    {/* Collapsible guide */}
    {showGuide&&<div style={{marginBottom:12,padding:"20px 24px",background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0"}}>
      <div style={{fontSize:14,color:"#475569",lineHeight:1.6,marginBottom:16}}>
        This dashboard models the General Fund over six fiscal years (FY27{"\u2013"}FY32). Toggle risks, add revenue measures, adjust cuts, and use reserves to find a path to structural balance.
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12,marginBottom:16}}>
        <div style={{padding:"14px 16px",borderRadius:8,background:"#fff",border:"1px solid #e2e8f0",borderTop:"3px solid "+RED}}>
          <div style={{fontSize:22,fontWeight:800,color:RED,marginBottom:2}}>1</div>
          <div style={{fontSize:13,fontWeight:700,color:"#1e293b",marginBottom:4}}>Revenue Risks</div>
          <div style={{fontSize:11,color:"#64748b",lineHeight:1.5}}>Click the red bar. Select the year each risk hits. The chart and table update instantly.</div>
        </div>
        <div style={{padding:"14px 16px",borderRadius:8,background:"#fff",border:"1px solid #e2e8f0",borderTop:"3px solid "+GREEN}}>
          <div style={{fontSize:22,fontWeight:800,color:GREEN,marginBottom:2}}>2</div>
          <div style={{fontSize:13,fontWeight:700,color:"#1e293b",marginBottom:4}}>Revenue Opportunities</div>
          <div style={{fontSize:11,color:"#64748b",lineHeight:1.5}}>Click the green bar. Pick an election year (2026, 2028, 2030). Revenue starts the next fiscal year.</div>
        </div>
        <div style={{padding:"14px 16px",borderRadius:8,background:"#fff",border:"1px solid #e2e8f0",borderTop:"3px solid "+AMBER}}>
          <div style={{fontSize:22,fontWeight:800,color:AMBER,marginBottom:2}}>3</div>
          <div style={{fontSize:13,fontWeight:700,color:"#1e293b",marginBottom:4}}>Service Cuts</div>
          <div style={{fontSize:11,color:"#64748b",lineHeight:1.5}}>Use +/{"\u2013"} buttons. 1% {"\u2248"} 1.8 FTEs {"\u2248"} $410K/yr. Cuts compound forward {"\u2014"} earlier = more savings.</div>
        </div>
        <div style={{padding:"14px 16px",borderRadius:8,background:"#fff",border:"1px solid #e2e8f0",borderTop:"3px solid "+PURPLE}}>
          <div style={{fontSize:22,fontWeight:800,color:PURPLE,marginBottom:2}}>4</div>
          <div style={{fontSize:13,fontWeight:700,color:"#1e293b",marginBottom:4}}>Use Reserves</div>
          <div style={{fontSize:11,color:"#64748b",lineHeight:1.5}}>Toggle on for deficit years. Surpluses auto-add. FY32 locked {"\u2014"} must balance without reserves. Target: 30%.</div>
        </div>
      </div>
      <div style={{display:"flex",gap:24,fontSize:12,color:"#64748b"}}>
        <span><strong style={{color:RED}}>Structural Gap:</strong> Revenue +2.1%/yr vs Expenditures +4.0%/yr</span>
        <span><strong style={{color:GREEN}}>Reserve Target:</strong> 30% of expenditures</span>
        <span><strong style={{color:AMBER}}>Key Insight:</strong> Early action is 2.5x more effective than late action</span>
      </div>
    </div>}

    {/* Dropdown toggles + Chart area */}
    <div style={{position:"relative",marginBottom:6}}>
      {/* Toggle bars */}
      <div style={{display:"flex",gap:6,marginBottom:6}}>
        <button onClick={function(){setRiskOpen(!riskOpen);if(!riskOpen)setOppOpen(false)}} style={{flex:1,padding:"10px 16px",borderRadius:8,border:"none",background:RED,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",transition:"all 0.2s"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:14,fontWeight:700,color:"#ffffff",textTransform:"uppercase",letterSpacing:1.5}}>Revenue Risks</span>
            <span style={{fontSize:13,color:"rgba(255,255,255,0.7)"}}>{Object.values(rT).filter(function(v){return v!=="Off"}).length} of {riskItems.length} active</span>
          </div>
          <span style={{fontSize:16,color:"#ffffff",transition:"transform 0.2s",display:"inline-block",transform:riskOpen?"rotate(180deg)":"rotate(0deg)"}}>{"\u25BC"}</span>
        </button>
        <button onClick={function(){setOppOpen(!oppOpen);if(!oppOpen)setRiskOpen(false)}} style={{flex:1,padding:"10px 16px",borderRadius:8,border:"none",background:GREEN,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",transition:"all 0.2s"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:14,fontWeight:700,color:"#ffffff",textTransform:"uppercase",letterSpacing:1.5}}>Revenue Opportunities</span>
            <span style={{fontSize:13,color:"rgba(255,255,255,0.7)"}}>{Object.values(oT).filter(function(v){return v!=="Off"}).length} of {opportunityItems.length} active</span>
          </div>
          <span style={{fontSize:16,color:"#ffffff",transition:"transform 0.2s",display:"inline-block",transform:oppOpen?"rotate(180deg)":"rotate(0deg)"}}>{"\u25BC"}</span>
        </button>
      </div>

      {/* Active selections summary */}
      {(Object.values(rT).some(function(v){return v!=="Off"})||Object.values(oT).some(function(v){return v!=="Off"}))&&<div style={{display:"flex",gap:8,marginBottom:6,padding:"2px 0"}}>
        <div style={{flex:1,display:"flex",gap:6,flexWrap:"wrap",minHeight:24}}>
          {riskItems.filter(function(r){return rT[r.id]!=="Off"}).map(function(r){
            return <span key={r.id} style={{fontSize:12,padding:"3px 10px",borderRadius:20,background:RED+"12",border:"1px solid "+RED+"25",color:"#64748b",display:"inline-flex",alignItems:"center",gap:4}}>
              {r.label} <span style={{color:RED,fontWeight:700}}>{rT[r.id]}</span>
            </span>;
          })}
        </div>
        <div style={{flex:1,display:"flex",gap:6,flexWrap:"wrap",minHeight:24}}>
          {opportunityItems.filter(function(o){return oT[o.id]!=="Off"}).map(function(o){
            return <span key={o.id} style={{fontSize:12,padding:"3px 10px",borderRadius:20,background:GREEN+"12",border:"1px solid "+GREEN+"25",color:"#64748b",display:"inline-flex",alignItems:"center",gap:4}}>
              {o.label} <span style={{color:GREEN,fontWeight:700}}>{oT[o.id]}</span>
            </span>;
          })}
        </div>
      </div>}

      {/* Chart */}
      <div style={{background:CARD_BG,border:"1px solid "+BORDER,borderRadius:8,padding:"12px 8px"}}>
        <div style={{fontSize:16,textTransform:"uppercase",letterSpacing:1.5,color:GRAY,fontWeight:600,marginBottom:6}}>Revenue vs Expenditure Projection</div>
        <div style={{fontSize:15,color:GRAY,marginBottom:6}}>
          <span style={{color:RED_LIGHT,fontWeight:600}}>{"\u25A0"}</span> Expenditures
          <span style={{marginLeft:10,color:GREEN,fontWeight:600}}>{"\u25A0"}</span> Revenue
          {tru>0&&<span><span style={{marginLeft:10,color:PURPLE,fontWeight:600}}>{"\u25A0"}</span> +Reserves</span>}
        </div>
        <SvgChart chartData={cd} yMin={ymn} yMax={ymx} totalReservesUsed={tru}/>
      </div>

      {/* Risks dropdown overlay */}
      {riskOpen && <div style={{position:"absolute",top:52,left:0,right:0,zIndex:20,borderRadius:8,border:"1px solid "+RED+"33",background:"rgba(255,255,255,0.92)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",boxShadow:"0 8px 32px rgba(0,0,0,0.12)",padding:"16px",overflow:"auto",maxHeight:"calc(100% - 58px)"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <TimingPanel title="Risks" items={riskItems.filter(function(r){return ["vlf","trsa","cardroom"].indexOf(r.id)>=0})} timings={rT} onTimingChange={setRT} accentColor={RED}/>
          <TimingPanel title="Risks (continued)" items={riskItems.filter(function(r){return ["vlf2","eraf","trsa_repay"].indexOf(r.id)>=0})} timings={rT} onTimingChange={setRT} accentColor={RED}/>
        </div>
      </div>}

      {/* Opportunities dropdown overlay */}
      {oppOpen && <div style={{position:"absolute",top:52,left:0,right:0,zIndex:20,borderRadius:8,border:"1px solid "+GREEN+"33",background:"rgba(255,255,255,0.92)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",boxShadow:"0 8px 32px rgba(0,0,0,0.12)",padding:"16px",overflow:"auto",maxHeight:"calc(100% - 58px)"}}>
        <TimingPanel title="Opportunities" items={opportunityItems} timings={oT} onTimingChange={setOT} accentColor={GREEN} yearOptions={ELECTION_YEARS}/>
      </div>}
    </div>

    <div style={{background:CARD_BG,border:"1px solid "+BORDER,borderRadius:8,padding:"10px 14px"}}>
      <div style={{fontSize:16,textTransform:"uppercase",letterSpacing:1.5,color:AMBER,fontWeight:700,marginBottom:8}}>Annual Balancing &#x2014; Cuts Reduce Expenditures, Compound Forward</div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:16}}>
          <thead><tr>
            <th style={{textAlign:"left",padding:"4px 6px",borderBottom:"2px solid "+BORDER,color:GRAY,fontSize:15,width:140}}></th>
            {yr.map(function(y){return <th key={y.year} style={{textAlign:"center",padding:"4px",borderBottom:"2px solid "+(y.isBalanced?GREEN:RED)+"44",color:y.isBalanced?GREEN:WHITE,fontWeight:700,fontSize:18}}>{y.year}{y.isBalanced?" \u2713":""}</th>})}
          </tr></thead>
          <tbody>
            
            <tr style={{background:"rgba(0,0,0,0.025)"}}><td style={{padding:"4px 6px",color:GRAY,fontSize:16,borderBottom:"1px solid "+BORDER+"22"}}>Beginning Surplus/(Deficit)</td>
              {yr.map(function(y){return <td key={y.year} style={{textAlign:"center",padding:"4px",borderBottom:"1px solid "+BORDER+"22",fontWeight:700,color:y.rawGap>=0?GREEN:RED_LIGHT,fontSize:18}}>{fmtSigned(y.rawGap)}</td>})}
            </tr>
            <tr><td style={{padding:"4px 6px",color:AMBER,fontSize:16,fontWeight:600,borderBottom:"1px solid "+BORDER+"22"}}>Service cuts</td>
              {yr.map(function(y){return <td key={y.year} style={{textAlign:"center",padding:"4px",borderBottom:"1px solid "+BORDER+"22"}}><Stepper value={y.thisYearCutPct} onChange={function(v){sYC(function(p){var n=Object.assign({},p);n[y.year]=v;return n})}} min={0} max={25} step={1} color={AMBER} cumulativePct={y.cumulativeCutPct}/></td>})}
            </tr>
            <tr style={{background:"rgba(0,0,0,0.025)"}}><td style={{padding:"4px 6px",color:GRAY,fontSize:16,borderBottom:"1px solid "+BORDER+"22"}}>Cumul. service reduction</td>
              {yr.map(function(y){return <td key={y.year} style={{textAlign:"center",padding:"4px",borderBottom:"1px solid "+BORDER+"22",color:y.cumulativeCutPct>0?AMBER:GRAY,fontWeight:700,fontSize:17}}>{y.cumulativeCutPct>0?y.cumulativeCutPct+"%":"\u2014"}</td>})}
            </tr>
            <tr><td style={{padding:"4px 6px",color:GRAY,fontSize:16,borderBottom:"1px solid "+BORDER+"22"}}>Adj. Surplus/(Deficit)</td>
              {yr.map(function(y){return <td key={y.year} style={{textAlign:"center",padding:"4px",borderBottom:"1px solid "+BORDER+"22",fontWeight:700,color:y.gapAfterCuts>=0?GREEN:RED_LIGHT,fontSize:18}}>{fmtSigned(y.gapAfterCuts)}</td>})}
            </tr>
            <tr style={{background:"rgba(0,0,0,0.025)"}}><td style={{padding:"4px 6px",color:PURPLE,fontSize:16,fontWeight:600,borderBottom:"1px solid "+BORDER+"22"}}>Use reserves</td>
              {yr.map(function(y){
                if(y.isFY32)return <td key={y.year} style={{textAlign:"center",padding:"4px",borderBottom:"1px solid "+BORDER+"22",fontSize:15,color:AMBER}}>locked</td>;
                if(y.gapAfterCuts>=0)return <td key={y.year} style={{textAlign:"center",padding:"4px",borderBottom:"1px solid "+BORDER+"22",color:GREEN,fontSize:16}}>{"\u2014"}</td>;
                var we=!y.useReserves&&Math.abs(y.gapAfterCuts)>y.reserveBal;
                return <td key={y.year} style={{textAlign:"center",padding:"4px",borderBottom:"1px solid "+BORDER+"22"}}>
                  <div onClick={function(){if(!we)sYR(function(p){var n=Object.assign({},p);n[y.year]=!p[y.year];return n})}} style={{cursor:we?"default":"pointer",opacity:we?0.4:1,display:"inline-block"}}>
                    <div style={{width:28,height:14,borderRadius:7,background:y.useReserves?PURPLE:"#2a2a3a",position:"relative",margin:"0 auto"}}>
                      <div style={{width:10,height:10,borderRadius:"50%",background:"#fff",position:"absolute",top:2,left:y.useReserves?16:2,transition:"left 0.2s"}}/>
                    </div>
                    {y.useReserves&&<div style={{fontSize:15,color:PURPLE,marginTop:1}}>{fmt(y.reserveAmount)}</div>}
                  </div>
                </td>;
              })}
            </tr>
            <tr style={{borderTop:"2px solid "+BORDER}}><td style={{padding:"5px 6px",fontWeight:700,color:WHITE,fontSize:17}}>Ending Surplus/(Deficit)</td>
              {yr.map(function(y){return <td key={y.year} style={{textAlign:"center",padding:"5px 4px"}}>
                <div style={{fontSize:15,fontWeight:800,color:y.isBalanced?GREEN:RED_LIGHT}}>{y.isBalanced?"\u2713":"("+fmt(Math.abs(y.finalPosition))+")"}</div>
                {y.isBalanced&&y.finalPosition>0.05&&<div style={{fontSize:14,color:GREEN}}>{fmt(y.finalPosition)}</div>}
              </td>})}
            </tr>
          </tbody>
        </table>
      </div>
      <div style={{marginTop:10,padding:"12px 14px",background:"#fff",borderRadius:8,border:"1px solid "+BORDER}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <span style={{fontSize:14,fontWeight:600,color:GRAY,whiteSpace:"nowrap"}}>Reserves</span>
          <div style={{flex:1,height:8,borderRadius:4,background:"#e0e4ea",overflow:"hidden",position:"relative"}}>
            <div style={{position:"absolute",left:0,top:0,height:"100%",borderRadius:4,width:Math.min(100,reserveBal/(finalTarget*1.5)*100)+"%",background:finalTargetMet?GREEN:reserveBal/finalTarget>0.5?AMBER:RED,transition:"all 0.3s"}}/>
            <div style={{position:"absolute",left:Math.min(98,finalTarget/(finalTarget*1.5)*100)+"%",top:-2,width:2,height:12,background:PURPLE,borderRadius:1}}/>
          </div>
          <span style={{fontSize:14,fontWeight:700,color:finalTargetMet?GREEN:RED,whiteSpace:"nowrap"}}>{fmt(reserveBal)}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:GRAY}}>
          <span>Target: {fmt(finalTarget)} (30% of expenditures)</span>
          <span style={{fontWeight:700,color:finalTargetMet?GREEN:RED}}>{finalTargetMet?"\u2713 Target met":"\u2717 Below target by "+fmt(finalTarget-reserveBal)}</span>
        </div>
        <div style={{display:"flex",gap:12,marginTop:8,fontSize:11,color:"#94a3b8"}}>
          {yr.map(function(y){return <div key={y.year} style={{flex:1,textAlign:"center"}}>
            <div style={{fontWeight:600,color:GRAY,fontSize:12}}>{y.year}</div>
            <div style={{fontWeight:700,color:y.targetMet?GREEN:RED,fontSize:13}}>{fmt(y.reserveBal)}</div>
            {y.surplusToReserves>0.05&&<div style={{color:GREEN,fontSize:10}}>{"+"+fmt(y.surplusToReserves)}</div>}
            {y.reserveAmount>0.05&&<div style={{color:RED,fontSize:10}}>{"("+fmt(y.reserveAmount)+")"}</div>}
          </div>})}
        </div>
      </div>
    </div>

    <div style={{marginTop:4,padding:"2px 0",borderTop:"1px solid "+BORDER,fontSize:14,color:"#999",textAlign:"center"}}>
      Forecast FY27-FY32 &#x2022; Cuts compound forward &#x2022; Surpluses add to reserves &#x2022; Reserve target: 30% of expenditures &#x2022; FY32 must balance without reserves
    </div>
  </div>;
}



ReactDOM.createRoot(document.getElementById('root')).render(<ForecastDashboard/>);
  </script>
</body>
</html>
