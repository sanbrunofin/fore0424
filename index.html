<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>San Bruno General Fund Forecast</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif; color: #1e293b; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    button { font-family: inherit; }
    button:focus { outline: none; }
    #loading { display:flex;align-items:center;justify-content:center;min-height:100vh; }
    #loading h2 { color:#94a3b8;font-size:16px;font-weight:400; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
</head>
<body>
  <div id="root"><div id="loading"><h2>Loading forecast...</h2></div></div>
  <script type="text/babel">
const { useState, useCallback, Fragment } = React;

/* ── Color system ── */
const DARK="#ffffff", CARD="#f8f9fb", BORDER="#e2e5ea", RED="#dc2626", RED_D="#b91c1c", AMBER="#ea580c", GREEN="#0f766e", GREEN_L="#0d9488", PURPLE="#7c3aed", GRAY="#64748b", INK="#1e293b";

/* ── Data ── */
const RESERVE_BASE=50.0, RESERVE_GROW=4.0;
const YEARS=["FY27","FY28","FY29","FY30","FY31","FY32"];
const baseData=[{year:"FY27",rev:78.44,exp:77.16},{year:"FY28",rev:80.26,exp:81.31},{year:"FY29",rev:82.17,exp:85.21},{year:"FY30",rev:83.74,exp:87.98},{year:"FY31",rev:85.38,exp:90.85},{year:"FY32",rev:87.07,exp:93.81}];
const departments=[{id:"police",sb:17.34,ftes:72},{id:"fire",sb:12.17,ftes:40},{id:"commsvc",sb:4.14,ftes:25.7},{id:"pw",sb:2.72,ftes:21.51},{id:"admin",sb:2.98,ftes:15.15},{id:"cm",sb:1.49,ftes:7.35},{id:"cd",sb:0.24,ftes:1.15}];
const totalSB=departments.reduce(function(s,d){return s+d.sb},0);
const totalFTEs=departments.reduce(function(s,d){return s+d.ftes},0);

const riskItems=[
  {id:"vlf",label:"VLF Backfill",amount:3.0,expReduction:0,color:RED,detail:"$3M revenue loss"},
  {id:"vlf2",label:"VLF Backfill II",amount:4.0,expReduction:0,color:RED,detail:"Additional $4M VLF revenue loss"},
  {id:"trsa",label:"TRSA",amount:8.0,expReduction:4.0,color:RED,detail:"$8M revenue loss, $4M lower reserve transfer, (net \u2013$4M)"},
  {id:"trsa_repay",label:"TRSA Repayment",amount:0,expBase:43.0,expPerYear:8.0,oneTime:true,color:RED,detail:"One-time repayment: $43M FY27 + $8M per year collected"},
  {id:"eraf",label:"Excess ERAF",amount:2.0,expReduction:0,color:RED,detail:"$2M revenue loss"},
  {id:"cardroom",label:"Cardroom",amount:3.4,expReduction:0,color:RED,detail:"$3.4M revenue loss"}
];
const opportunityItems=[
  {id:"measure6",label:"$7.0M Revenue Measure",amount:7.0,growth:0.04,color:GREEN,detail:"Major tax measure, grows 4.0%/yr."},
  {id:"measure35",label:"$3.5M Revenue Measure",amount:3.5,growth:0.02,color:GREEN,detail:"Moderate tax measure, grows 2.0%/yr."},
  {id:"measure1",label:"$1.0M Revenue Measure",amount:1.0,growth:0.02,color:GREEN_L,detail:"Smaller tax measure, grows 2.0%/yr."}
];
const ELECTION_YEARS=["2026","2028","2030"];
const ELECTION_TO_FY={"2026":"FY28","2028":"FY30","2030":"FY32"};

function fmt(n){return "$"+Math.abs(n).toFixed(1)+"M";}
function fmtSigned(n){return n<-0.05?"("+fmt(n)+")":"$"+n.toFixed(1)+"M";}

/* ── Year pill selector ── */
function YearPills({value,onChange,color,options:co}){
  var opts=["Off"].concat(co||YEARS);
  return <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
    {opts.map(function(o){var a=value===o,off=o==="Off";
      return <button key={o} onClick={function(){onChange(o)}} style={{
        padding:"3px 8px",borderRadius:4,border:"none",fontSize:13,fontWeight:600,cursor:"pointer",
        transition:"all 0.15s",
        background:a?(off?"#e2e5ea":color+"18"):"#f1f3f5",
        color:a?(off?GRAY:color):"#94a3b8",
        boxShadow:a?"inset 0 0 0 1.5px "+(off?"#94a3b8":color):"none"
      }}>{o}</button>;
    })}
  </div>;
}

/* ── Dropdown panel for risks/opportunities ── */
function DropdownPanel({title,items,timings,onTimingChange,accentColor,yearOptions}){
  var isRisk=accentColor===RED;
  return <div>
    {items.map(function(item){
      var timing=timings[item.id]||"Off",isA=timing!=="Off";
      var da=item.amount;
      if(item.expBase!==undefined){var yi=isA?YEARS.indexOf(timing):-1;da=isA?item.expBase+(item.expPerYear||0)*yi:0;}
      return <div key={item.id} style={{
        padding:"10px 14px",marginBottom:8,borderRadius:8,
        background:isA?"#ffffff":CARD,
        border:"1px solid "+(isA?accentColor+"40":BORDER),
        boxShadow:isA?"0 1px 4px "+accentColor+"15":"none",
        transition:"all 0.2s"
      }}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{flex:1}}>
            <span style={{fontSize:15,fontWeight:700,color:INK}}>{item.label}</span>
            <span style={{fontSize:13,color:GRAY,marginLeft:8}}>{item.detail}</span>
          </div>
          <div style={{fontSize:16,fontWeight:800,color:isA?accentColor:"#cbd5e1",marginLeft:12}}>
            {isRisk?"("+fmt(da)+")":fmt(da)}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:13,color:GRAY}}>{isRisk?"Hits in:":"Election:"}</span>
          <YearPills value={timing} onChange={function(yr){onTimingChange(item.id,yr)}} color={accentColor} options={yearOptions}/>
        </div>
      </div>;
    })}
  </div>;
}

/* ── Stepper ── */
function Stepper({value,onChange,min,max,step,color}){
  var btnStyle={width:28,height:28,borderRadius:6,border:"1px solid "+BORDER,background:"#fff",color:GRAY,cursor:"pointer",fontSize:16,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",padding:0,transition:"background 0.15s"};
  return <div style={{display:"flex",alignItems:"center",gap:4,justifyContent:"center"}}>
    <button onClick={function(){onChange(Math.max(min,value-step))}} style={Object.assign({},btnStyle)}>-</button>
    <div style={{fontSize:18,fontWeight:800,color:value>0?color:"#cbd5e1",minWidth:36,textAlign:"center"}}>{value}%</div>
    <button onClick={function(){onChange(Math.min(max,value+step))}} style={Object.assign({},btnStyle)}>+</button>
  </div>;
}

/* ── SVG Chart ── */
function SvgChart({chartData,yMin,yMax,totalReservesUsed}){
  var[hi,setHi]=useState(null);
  var W=1600,H=480,PL=60,PR=20,PT=20,PB=40,pW=W-PL-PR,pH=H-PT-PB,n=chartData.length;
  function xP(i){return PL+(i/(n-1))*pW;}
  function yP(v){return PT+pH-((v-yMin)/(yMax-yMin))*pH;}
  function mp(k){return chartData.map(function(d,i){return(i===0?"M":"L")+xP(i).toFixed(1)+","+yP(d[k]).toFixed(1)}).join(" ");}
  function ma(k){return mp(k)+" L"+xP(n-1).toFixed(1)+","+yP(yMin).toFixed(1)+" L"+xP(0).toFixed(1)+","+yP(yMin).toFixed(1)+" Z";}
  var gl=[];for(var v=yMin;v<=yMax;v+=5)gl.push(v);
  var hd=hi!==null?chartData[hi]:null,hG=hd?hd.adjRev-hd.exp:0,hR=hd?(hd.balanced||hd.adjRev)-hd.adjRev:0;
  return <div style={{position:"relative",height:H}}>
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"100%"}} onMouseLeave={function(){setHi(null)}}>
      {gl.map(function(v){return <g key={v}><line x1={PL} x2={W-PR} y1={yP(v)} y2={yP(v)} stroke="#f0f1f3" strokeWidth={1}/><text x={PL-8} y={yP(v)+4} fill="#94a3b8" fontSize={13} textAnchor="end" fontFamily="IBM Plex Sans">{"$"+v+"M"}</text></g>})}
      {chartData.map(function(d,i){return <text key={d.year} x={xP(i)} y={H-8} fill={GRAY} fontSize={15} fontWeight={700} textAnchor="middle" fontFamily="IBM Plex Sans">{d.year}</text>})}
      <path d={ma("exp")} fill={RED} opacity={0.04}/>
      <path d={mp("exp")} fill="none" stroke={RED} strokeWidth={3.5} strokeLinejoin="round"/>
      <path d={ma("adjRev")} fill={GREEN} opacity={0.04}/>
      <path d={mp("adjRev")} fill="none" stroke={GREEN} strokeWidth={3.5} strokeLinejoin="round"/>
      {totalReservesUsed>0&&<Fragment>
        <path d={ma("balanced")} fill={PURPLE} opacity={0.03}/>
        <path d={mp("balanced")} fill="none" stroke={PURPLE} strokeWidth={2.5} strokeDasharray="8 4" strokeLinejoin="round"/>
        {chartData.map(function(d,i){return <circle key={"b"+i} cx={xP(i)} cy={yP(d.balanced)} r={5} fill={PURPLE} stroke="#fff" strokeWidth={2.5}/>})}
      </Fragment>}
      {chartData.map(function(d,i){return <circle key={"e"+i} cx={xP(i)} cy={yP(d.exp)} r={6} fill={RED} stroke="#fff" strokeWidth={2.5}/>})}
      {chartData.map(function(d,i){return <circle key={"r"+i} cx={xP(i)} cy={yP(d.adjRev)} r={6} fill={GREEN} stroke="#fff" strokeWidth={2.5}/>})}
      {chartData.map(function(d,i){return <rect key={"h"+i} x={xP(i)-pW/(n*2)} y={PT} width={pW/n} height={pH} fill="transparent" onMouseEnter={function(){setHi(i)}}/>})}
      {hi!==null&&<line x1={xP(hi)} x2={xP(hi)} y1={PT} y2={PT+pH} stroke="#cbd5e1" strokeWidth={1}/>}
    </svg>
    {hd&&hi!==null&&<div style={{position:"absolute",top:20,left:Math.min(xP(hi)/W*100,72)+"%",background:"#fffffffa",border:"1px solid "+BORDER,borderRadius:10,padding:"14px 18px",fontSize:14,color:INK,minWidth:220,zIndex:10,pointerEvents:"none",boxShadow:"0 4px 16px rgba(0,0,0,0.08)"}}>
      <div style={{fontWeight:800,fontSize:18,marginBottom:8,color:INK}}>{hd.year}</div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:RED}}>Expenditures</span><span style={{fontWeight:700}}>{"$"+hd.exp.toFixed(1)+"M"}</span></div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:GREEN}}>Revenue</span><span style={{fontWeight:700}}>{"$"+hd.adjRev.toFixed(1)+"M"}</span></div>
      {hR>0.05&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:PURPLE}}>Reserves</span><span style={{fontWeight:700}}>{"$"+hR.toFixed(1)+"M"}</span></div>}
      <div style={{marginTop:6,paddingTop:6,borderTop:"1px solid "+BORDER,display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:15,color:hG>=-0.05?GREEN:RED}}>
        <span>{hG>=-0.05?"Surplus":"Gap"}</span><span>{hG>=0?"$"+hG.toFixed(1)+"M":"($"+Math.abs(hG).toFixed(1)+"M)"}</span>
      </div>
    </div>}
  </div>;
}

/* ── Main Dashboard ── */
function ForecastDashboard(){
  var[rT,sRT]=useState({vlf:"Off",vlf2:"Off",trsa:"Off",trsa_repay:"Off",eraf:"Off",cardroom:"Off"});
  var[oT,sOT]=useState({measure6:"Off",measure35:"Off",measure1:"Off"});
  var[yC,sYC]=useState({FY27:0,FY28:0,FY29:0,FY30:0,FY31:0,FY32:0});
  var[riskOpen,setRiskOpen]=useState(false);
  var[oppOpen,setOppOpen]=useState(false);
  var setRT=useCallback(function(id,yr){sRT(function(p){var n=Object.assign({},p);n[id]=yr;return n});setRiskOpen(false)},[]);
  var setOT=useCallback(function(id,yr){sOT(function(p){var n=Object.assign({},p);n[id]=yr;return n});setOppOpen(false)},[]);

  function gYI(year){
    var yi=YEARS.indexOf(year),ri=0,re=0,rx=0,oi=0;
    riskItems.forEach(function(r){var t=rT[r.id];if(t==="Off")return;var si=YEARS.indexOf(t);
      if(r.oneTime){if(yi===si){if(r.expBase!==undefined)rx+=r.expBase+(r.expPerYear||0)*si;else rx+=(r.expIncrease||0);ri+=r.amount;}}
      else{if(si>=0&&yi>=si){ri+=r.amount;re+=(r.expReduction||0);}}
    });
    opportunityItems.forEach(function(o){var t=oT[o.id];if(t==="Off")return;var sf=ELECTION_TO_FY[t];if(!sf)return;var si=YEARS.indexOf(sf);
      if(si>=0&&yi>=si)oi+=o.amount*Math.pow(1+(o.growth||0),yi-si);
    });
    return{riskImpact:ri,riskExpReduction:re,riskExpIncrease:rx,oppImpact:oi};
  }

  var yr=[],ccp=0,rc=RESERVE_BASE;
  var tt=rT["trsa"],tsi=tt!=="Off"?YEARS.indexOf(tt):-1;
  // First pass: compute reserve cap from TRSA growth
  baseData.forEach(function(d,idx){ if(tsi<0||idx<tsi)rc+=RESERVE_GROW; });
  // Second pass: build year results with running reserve balance
  var reserveBal=rc;
  ccp=0;
  baseData.forEach(function(d,idx){
    var im=gYI(d.year),ar=d.rev-im.riskImpact+im.oppImpact;
    var tcp=yC[d.year]||0;ccp+=tcp;var cs=(ccp/100)*totalSB;
    var ae=d.exp-cs-im.riskExpReduction+im.riskExpIncrease;
    var rg=ar-(d.exp-im.riskExpReduction+im.riskExpIncrease),gc=ar-ae;
    var f32=d.year==="FY32";
    // Surpluses add to reserves, deficits draw from reserves (except FY32)
    var reserveChange=0;
    if(gc>0.05){ reserveChange=gc; }
    else if(gc<-0.05&&!f32){ reserveChange=Math.max(gc,-reserveBal); }
    reserveBal=reserveBal+reserveChange;
    var ra=reserveChange<0?Math.abs(reserveChange):0;
    var surplusToReserves=reserveChange>0?reserveChange:0;
    var uncovered=gc<-0.05&&!f32?Math.abs(gc)-ra:0;
    var fp=f32?gc:(uncovered>0.05?-uncovered:0);
    var ib=fp>=-0.05;
    var resTarget=ae*0.30;
    var targetMet=reserveBal>=resTarget;
    yr.push(Object.assign({},d,{adjRev:ar,adjExp:ae,rawGap:rg,riskImpact:im.riskImpact,riskExpReduction:im.riskExpReduction,riskExpIncrease:im.riskExpIncrease,oppImpact:im.oppImpact,thisYearCutPct:tcp,cumulativeCutPct:ccp,cumulativeSavings:cs,gapAfterCuts:gc,reserveAmount:ra,surplusToReserves:surplusToReserves,reserveChange:reserveChange,finalPosition:fp,isBalanced:ib,isFY32:f32,reserveBal:reserveBal,resTarget:resTarget,targetMet:targetMet}));
  });
  var finalReserveBal=yr.length>0?yr[yr.length-1].reserveBal:rc;
  var finalTarget=yr.length>0?yr[yr.length-1].resTarget:0;
  var finalTargetMet=finalReserveBal>=finalTarget;
  var tru=yr.reduce(function(s,y){return s+y.reserveAmount},0);
  var rr=finalReserveBal;
  var cd=yr.map(function(y){return{year:y.year,exp:y.adjExp,adjRev:y.adjRev,balanced:y.adjRev}});
  var av=cd.reduce(function(a,d){return a.concat([d.exp,d.adjRev,d.balanced])},[]);
  var ymn=Math.floor(Math.min.apply(null,av)/5)*5-5,ymx=Math.ceil(Math.max.apply(null,av)/5)*5+5;
  var f=yr[yr.length-1];
  var riskCount=Object.values(rT).filter(function(v){return v!=="Off"}).length;
  var oppCount=Object.values(oT).filter(function(v){return v!=="Off"}).length;

  function doReset(){sRT({vlf:"Off",vlf2:"Off",trsa:"Off",trsa_repay:"Off",eraf:"Off",cardroom:"Off"});sOT({measure6:"Off",measure35:"Off",measure1:"Off"});sYC({FY27:0,FY28:0,FY29:0,FY30:0,FY31:0,FY32:0});setRiskOpen(false);setOppOpen(false);}

  /* ── Table row helpers ── */
  var cellBase={textAlign:"center",padding:"10px 6px",borderBottom:"1px solid #f0f1f3"};
  var labelBase={padding:"10px 14px",borderBottom:"1px solid #f0f1f3",fontSize:14,fontWeight:500};

  return <div style={{maxWidth:1400,margin:"0 auto",padding:"16px 24px"}}>

    {/* ── Header ── */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:20,paddingBottom:12,borderBottom:"2px solid #f0f1f3"}}>
      <div>
        <div style={{fontSize:13,textTransform:"uppercase",letterSpacing:3,color:"#94a3b8",fontWeight:500,marginBottom:2}}>City of San Bruno</div>
        <div style={{fontSize:32,fontWeight:800,color:INK,lineHeight:1.1}}>General Fund Forecast <span style={{color:"#94a3b8",fontWeight:400}}>{"\u2014"} What If?</span></div>
      </div>
      <button onClick={doReset} style={{padding:"10px 24px",borderRadius:8,border:"none",background:"#34d399",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700,letterSpacing:0.3,transition:"background 0.2s"}}>Reset All</button>
    </div>

    {/* ── Chart + dropdowns ── */}
    <div style={{position:"relative",marginBottom:16}}>

      {/* Toggle bars */}
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <button onClick={function(){setRiskOpen(!riskOpen);if(!riskOpen)setOppOpen(false)}} style={{flex:1,padding:"12px 20px",borderRadius:8,border:"none",background:RED,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",transition:"all 0.2s"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:14,fontWeight:700,color:"#fff",textTransform:"uppercase",letterSpacing:1.5}}>Revenue Risks</span>
            <span style={{fontSize:13,color:"rgba(255,255,255,0.65)",fontWeight:500}}>{riskCount>0?riskCount+" active":"none active"}</span>
          </div>
          <span style={{color:"#fff",fontSize:12,transition:"transform 0.2s",display:"inline-block",transform:riskOpen?"rotate(180deg)":"none"}}>{"\u25BC"}</span>
        </button>
        <button onClick={function(){setOppOpen(!oppOpen);if(!oppOpen)setRiskOpen(false)}} style={{flex:1,padding:"12px 20px",borderRadius:8,border:"none",background:GREEN,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",transition:"all 0.2s"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:14,fontWeight:700,color:"#fff",textTransform:"uppercase",letterSpacing:1.5}}>Revenue Opportunities</span>
            <span style={{fontSize:13,color:"rgba(255,255,255,0.65)",fontWeight:500}}>{oppCount>0?oppCount+" active":"none active"}</span>
          </div>
          <span style={{color:"#fff",fontSize:12,transition:"transform 0.2s",display:"inline-block",transform:oppOpen?"rotate(180deg)":"none"}}>{"\u25BC"}</span>
        </button>
      </div>

      {/* Active selections summary */}
      {(riskCount>0||oppCount>0)&&<div style={{display:"flex",gap:8,marginBottom:6,padding:"2px 0"}}>
        <div style={{flex:1,display:"flex",gap:6,flexWrap:"wrap",minHeight:24}}>
          {riskItems.filter(function(r){return rT[r.id]!=="Off"}).map(function(r){
            return <span key={r.id} style={{fontSize:12,padding:"3px 10px",borderRadius:20,background:RED+"12",border:"1px solid "+RED+"25",color:"#64748b",display:"inline-flex",alignItems:"center",gap:4}}>
              {r.label} <span style={{color:RED,fontWeight:700}}>{rT[r.id]}</span>
            </span>;
          })}
        </div>
        <div style={{flex:1,display:"flex",gap:6,flexWrap:"wrap",minHeight:24}}>
          {opportunityItems.filter(function(o){return oT[o.id]!=="Off"}).map(function(o){
            return <span key={o.id} style={{fontSize:12,padding:"3px 10px",borderRadius:20,background:GREEN+"12",border:"1px solid "+GREEN+"25",color:"#64748b",display:"inline-flex",alignItems:"center",gap:4}}>
              {o.label} <span style={{color:GREEN,fontWeight:700}}>{oT[o.id]}</span>
            </span>;
          })}
        </div>
      </div>}

      {/* Chart card */}
      <div style={{background:CARD,border:"1px solid "+BORDER,borderRadius:10,padding:"16px 12px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:13,textTransform:"uppercase",letterSpacing:1.5,color:"#94a3b8",fontWeight:600}}>Revenue vs Expenditure Projection</div>
          <div style={{fontSize:13,color:"#94a3b8",display:"flex",gap:16}}>
            <span><span style={{color:RED,fontWeight:700}}>{"\u2014\u2014"}</span> Expenditures</span>
            <span><span style={{color:GREEN,fontWeight:700}}>{"\u2014\u2014"}</span> Revenue</span>
            {tru>0&&<span style={{color:PURPLE,fontWeight:600}}>{"\u00B7"} Reserves auto-applied</span>}
          </div>
        </div>
        <SvgChart chartData={cd} yMin={ymn} yMax={ymx} totalReservesUsed={tru}/>
      </div>

      {/* Risk overlay */}
      {riskOpen&&<div style={{position:"absolute",top:56,left:0,right:0,zIndex:20,borderRadius:10,border:"1px solid "+RED+"30",background:"rgba(255,255,255,0.95)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",boxShadow:"0 12px 40px rgba(0,0,0,0.10)",padding:"20px",overflow:"auto",maxHeight:"calc(100% - 62px)"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <DropdownPanel items={riskItems.filter(function(r){return["vlf","trsa","cardroom"].indexOf(r.id)>=0})} timings={rT} onTimingChange={setRT} accentColor={RED}/>
          <DropdownPanel items={riskItems.filter(function(r){return["vlf2","eraf","trsa_repay"].indexOf(r.id)>=0})} timings={rT} onTimingChange={setRT} accentColor={RED}/>
        </div>
      </div>}

      {/* Opportunity overlay */}
      {oppOpen&&<div style={{position:"absolute",top:56,left:0,right:0,zIndex:20,borderRadius:10,border:"1px solid "+GREEN+"30",background:"rgba(255,255,255,0.95)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",boxShadow:"0 12px 40px rgba(0,0,0,0.10)",padding:"20px",overflow:"auto",maxHeight:"calc(100% - 62px)"}}>
        <DropdownPanel items={opportunityItems} timings={oT} onTimingChange={setOT} accentColor={GREEN} yearOptions={ELECTION_YEARS}/>
      </div>}
    </div>

    {/* ── Balancing table ── */}
    <div style={{background:CARD,border:"1px solid "+BORDER,borderRadius:10,padding:"20px",marginBottom:16}}>
      <div style={{fontSize:13,textTransform:"uppercase",letterSpacing:1.5,color:"#94a3b8",fontWeight:600,marginBottom:14}}>Annual Balancing</div>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr>
          <th style={{textAlign:"left",padding:"8px 14px",borderBottom:"2px solid "+BORDER,color:"#94a3b8",fontSize:13,width:200}}></th>
          {yr.map(function(y){return <th key={y.year} style={{textAlign:"center",padding:"8px 6px",borderBottom:"2px solid "+(y.isBalanced?GREEN:RED),fontSize:16,fontWeight:700,color:y.isBalanced?GREEN:INK}}>{y.year}{y.isBalanced?" \u2713":""}</th>})}
        </tr></thead>
        <tbody>
          {/* Beginning surplus/deficit */}
          <tr>
            <td style={Object.assign({},labelBase,{color:GRAY})}>Beginning Surplus/(Deficit)</td>
            {yr.map(function(y){return <td key={y.year} style={Object.assign({},cellBase,{fontWeight:700,color:y.rawGap>=0?GREEN:RED,fontSize:16})}>{fmtSigned(y.rawGap)}</td>})}
          </tr>

          {/* Service cuts - interactive */}
          <tr style={{background:"#fff"}}>
            <td style={Object.assign({},labelBase,{color:AMBER,fontWeight:700,fontSize:16,borderLeft:"4px solid "+AMBER})}>Service Cuts</td>
            {yr.map(function(y){return <td key={y.year} style={Object.assign({},cellBase)}><Stepper value={y.thisYearCutPct} onChange={function(v){sYC(function(p){var n=Object.assign({},p);n[y.year]=v;return n})}} min={0} max={25} step={1} color={AMBER}/></td>})}
          </tr>

          {/* Cumul reduction */}
          <tr>
            <td style={Object.assign({},labelBase,{color:GRAY})}>Cumul. Service Reduction</td>
            {yr.map(function(y){return <td key={y.year} style={Object.assign({},cellBase,{fontWeight:700,color:y.cumulativeCutPct>0?AMBER:"#cbd5e1",fontSize:15})}>{y.cumulativeCutPct>0?y.cumulativeCutPct+"%":"\u2014"}</td>})}
          </tr>

          {/* Adj surplus */}
          <tr style={{background:"#fff"}}>
            <td style={Object.assign({},labelBase,{color:GRAY})}>Adj. Surplus/(Deficit)</td>
            {yr.map(function(y){return <td key={y.year} style={Object.assign({},cellBase,{fontWeight:700,color:y.gapAfterCuts>=0?GREEN:RED,fontSize:16})}>{fmtSigned(y.gapAfterCuts)}</td>})}
          </tr>

          {/* Reserve impact */}
          <tr>
            <td style={Object.assign({},labelBase,{color:PURPLE,fontWeight:600,fontSize:14})}>Reserve impact</td>
            {yr.map(function(y){return <td key={y.year} style={Object.assign({},cellBase,{fontWeight:700,fontSize:14,color:y.reserveChange>0.05?GREEN:y.reserveChange<-0.05?RED:"#cbd5e1"})}>
              {y.reserveChange>0.05?"+"+fmt(y.reserveChange):y.reserveChange<-0.05?"("+fmt(Math.abs(y.reserveChange))+")":"\u2014"}
            </td>})}
          </tr>

          {/* Ending surplus/deficit */}
          <tr style={{background:"#fff"}}>
            <td style={{padding:"12px 14px",borderTop:"2px solid "+BORDER,fontSize:15,fontWeight:800,color:INK}}>Ending Surplus/(Deficit)</td>
            {yr.map(function(y){return <td key={y.year} style={{textAlign:"center",padding:"12px 6px",borderTop:"2px solid "+BORDER}}>
              <div style={{fontSize:18,fontWeight:800,color:y.isBalanced?GREEN:RED}}>{y.isBalanced?"\u2713":"("+fmt(Math.abs(y.finalPosition))+")"}</div>
            </td>})}
            </td>})}
          </tr>
        </tbody>
      </table>

      {/* Reserve gauge */}
      <div style={{marginTop:16,padding:"14px 16px",background:"#fff",borderRadius:8,border:"1px solid "+BORDER}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
          <span style={{fontSize:14,fontWeight:600,color:GRAY,whiteSpace:"nowrap"}}>Reserves</span>
          <div style={{flex:1,height:8,borderRadius:4,background:"#f0f1f3",overflow:"hidden",position:"relative"}}>
            <div style={{position:"absolute",left:0,top:0,height:"100%",borderRadius:4,width:Math.min(100,finalReserveBal/(finalTarget*1.5)*100)+"%",background:finalTargetMet?GREEN:finalReserveBal/finalTarget>0.5?AMBER:RED,transition:"all 0.3s"}}/>
            <div style={{position:"absolute",left:Math.min(98,finalTarget/(finalTarget*1.5)*100)+"%",top:-2,width:2,height:12,background:PURPLE,borderRadius:1}}/>
          </div>
          <span style={{fontSize:14,fontWeight:700,color:finalTargetMet?GREEN:RED,whiteSpace:"nowrap"}}>{fmt(finalReserveBal)}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:GRAY}}>
          <span>Target: {fmt(finalTarget)} (30% of expenditures)</span>
          <span style={{fontWeight:700,color:finalTargetMet?GREEN:RED}}>{finalTargetMet?"\u2713 Target met":"\u2717 Below target by "+fmt(finalTarget-finalReserveBal)}</span>
        </div>
        <div style={{display:"flex",gap:16,marginTop:6,fontSize:11,color:"#94a3b8"}}>
          {yr.map(function(y){return <div key={y.year} style={{flex:1,textAlign:"center"}}>
            <div style={{fontWeight:600,color:GRAY}}>{y.year}</div>
            <div style={{fontWeight:700,color:y.targetMet?GREEN:RED}}>{fmt(y.reserveBal)}</div>
            {y.surplusToReserves>0.05&&<div style={{color:GREEN,fontSize:10}}>{"+"+fmt(y.surplusToReserves)}</div>}
            {y.reserveAmount>0.05&&<div style={{color:RED,fontSize:10}}>{"("+fmt(y.reserveAmount)+")"}</div>}
          </div>})}
        </div>
      </div>
    </div>

    {/* ── Footer ── */}
    <div style={{textAlign:"center",padding:"8px 0",fontSize:12,color:"#94a3b8"}}>
      Forecast FY27{"\u2013"}FY32 {"\u00B7"} Cuts compound forward {"\u00B7"} Surpluses add to reserves {"\u00B7"} Reserve target: 30% of expenditures {"\u00B7"} FY32 must balance without reserves
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<ForecastDashboard/>);
  </script>
</body>
</html>
