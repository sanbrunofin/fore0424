<html>
<body style="background:#0d1520">
<div id="root">Loading...</div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
<script type="text/babel">
const { useState } = React;

const RED = "#e63946";
const GREEN = "#2a9d8f";
const WHITE = "#e8ecf1";
const GRAY = "#6b7f95";

function App() {
  const [count, setCount] = useState(0);
  return (
    <div style={{color: WHITE, padding: 40, fontFamily: 'sans-serif'}}>
      <h1>San Bruno Forecast Test</h1>
      <p style={{color: GRAY}}>If you see this, the base code works.</p>
      <button onClick={() => setCount(c => c+1)} style={{padding:'10px 20px',background:GREEN,color:'white',border:'none',borderRadius:4,cursor:'pointer',fontSize:16}}>
        Clicked {count} times
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
